apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opti-nms.fullname" . }}
  labels:
    {{- include "opti-nms.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "opti-nms.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "opti-nms.name" . }}
    spec:
      containers:
        - name: {{ include "opti-nms.fullname" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "opti-nms.fullname" . }}-config
            - secretRef:
                name: {{ include "opti-nms.fullname" . }}-secret
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: backup-storage
              mountPath: /data/backups
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
      volumes:
        - name: backup-storage
          persistentVolumeClaim:
            claimName: {{ include "opti-nms.fullname" . }}-backup-pvc
