# ============================================
# PRODUCTION PROFILE OVERRIDES
# ============================================

spring:
  data:
    mongodb:
      auto-index-creation: false

  jackson:
    serialization:
      indent_output: false

# ============================================
# SWAGGER/OPENAPI — Disabled in production
# ============================================
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ============================================
# ACTUATOR — Health details only for authenticated users
# ============================================
management:
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized

logging:
  level:
    root: WARN
    com.opticoms.optinmscore: INFO
    org.springframework.data.mongodb: WARN
    org.springframework.web: WARN

# ============================================
# CORS — Must be set explicitly in production
# ============================================
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
