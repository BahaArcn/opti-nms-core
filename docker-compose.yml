services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: optinms_db
    ports:
      - "${MONGO_EXTERNAL_PORT:-27018}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  optinms-core:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_DATABASE: optinms_db
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      APP_MASTER_TOKEN: ${APP_MASTER_TOKEN}
      SPRING_PROFILES_ACTIVE: prod
      K8S_DEPLOY_ENABLED: "false"
      FIREWALL_APPLY_ENABLED: "false"
      OPEN5GS_UPF_METRICS_URL: "http://host.docker.internal:9092"
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-}
      SPRINGDOC_API_DOCS_ENABLED: ${SPRINGDOC_API_DOCS_ENABLED:-false}
      SPRINGDOC_SWAGGER_UI_ENABLED: ${SPRINGDOC_SWAGGER_UI_ENABLED:-false}
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
